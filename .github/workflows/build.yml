
# .github/workflows/build.yml
name: Build News Site

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # optional

permissions:
  contents: write   # 👈 required so GITHUB_TOKEN can push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # default; ensures push uses GITHUB_TOKEN
          fetch-depth: 0              # good practice when pushing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (if any)
        run: |
          python -m pip install -U pip
          # pip install -r requirements.txt  # if you have one

      - name: Ensure data dir
        run: mkdir -p data

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit scraped data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Auto-update news [skip ci]"
      
      - name: Push changes
        if: ${{ success() }}
        run: |
          # Only push if we actually committed something
          if git log -1 --pretty=%B | grep -q "Auto-update news"; then
            # Use the token/credentials injected by actions/checkout
            git push
          else
            echo "Nothing to push."
          fi
