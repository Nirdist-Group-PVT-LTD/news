
# .github/workflows/pages.yml
name: Pages build and deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 👉 If you use Jekyll in /docs
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      # 👉 If you DON'T use Jekyll, remove the block above and instead:
      # - name: Prepare static site
      #   run: |
      #     mkdir -p _site
      #     cp -r docs/* _site/  # or your real build output
      #     # cp -r data _site/data

      # ✅ CRITICAL: Only one upload-pages-artifact in the entire run
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ✅ CRITICAL: Deploy only. Do NOT upload again here.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
