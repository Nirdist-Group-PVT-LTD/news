
# .github/workflows/build.yml
name: Build News Site

on:
  workflow_dispatch:         # run manually
  schedule:
    - cron: "*/30 * * * *"   # or a cadence you prefer

permissions:
  contents: write            # to commit data/cache.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: |
          mkdir -p data
          python scripts/scraper.py

      - name: Commit scraped data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --staged --quiet && echo "No changes" || git commit -m "Auto-update news [skip ci]"
          git rev-parse --verify HEAD && git push || true

      # ✅ If you want an artifact for debugging, use the REGULAR artifact action
      - name: Upload scraper output (regular artifact)
        uses: actions/upload-artifact@v4
        with:
          name: scraper-data
          path: data/cache.json
